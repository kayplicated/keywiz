# Extension preset — mirror of drifter for users who prefer reaching
# up over curling down. Rewards extension cascades, penalizes flexion
# cascades, otherwise identical to drifter.
#
# Useful for two things:
#   1. Demonstrating that the pipeline is philosophy-neutral — a
#      preset optimized for the *opposite* direction should make a
#      reaching-friendly layout look good.
#   2. Users who actually prefer top-row-heavy layouts (Colemak-DH,
#      Gallium) getting a scorer whose priors match.

[corpus]
path = "../../../../oxeylyzer/static/language_data/english.json"

[analyzers]
enabled = [
    "sfb",
    "roll",
    "scissor",
    "stretch",
    "same_row_skip",
    "same_row_skip_fingerpair",
    "sfs",
    "inward_roll",
    "outward_roll",
    "onehand",
    "alternate",
    "redirect",
    "bad_redirect",
    "hand_territory",
    "flexion_cascade",
    "extension_cascade",
    "row_cascade",
    "terminal_penalty",
    "async_hand_drift",
    "row_distribution",
    "finger_load",
]

[analyzers.sfb]
penalty = -7.0
lateral_penalty = -2.0

[analyzers.roll]
same_row_adjacent = 2.0
inward_multiplier = 1.0
outward_multiplier = 1.1

[analyzers.scissor]
base_penalty = -2.0
# Extension philosophy: flexion (home↔bot) costs more than extension.
flexion = 1.3
extension = 0.8
full_cross = 1.2
index_middle_forward_ok = true
middle_ring_forward_ok = true
ring_pinky_forward_ok = true
forward_threshold = 0.0

[analyzers.stretch]
penalty = -1.0

[analyzers.same_row_skip]
weight = 0.0

# Enabled but all weights zero — the per-pair table is
# kinesthetic-philosophy, and the Extension preset stays neutral
# on it. Users who want extension-preferring finger-pair rewards
# can override here.
[analyzers.same_row_skip_fingerpair]

# Same-finger skipgrams are a real ergonomic cost regardless of
# row-direction philosophy — extension preset matches drifter here.
[analyzers.sfs]
penalty = -2.0
lateral_penalty = -0.5
gap = 1

[analyzers.inward_roll]
weight = 3.0
skip_multiplier = 0.7
end_on_pinky_multiplier = 1.0

[analyzers.outward_roll]
weight = 2.5
skip_multiplier = 0.7
end_on_pinky_multiplier = 1.0

[analyzers.onehand]
weight = 1.0

[analyzers.alternate]
weight = 0.4
partial_weight = 0.15

[analyzers.redirect]
weight = -3.0
anchor_fingers = ["l_index", "r_index"]

[analyzers.bad_redirect]
weight = -5.0
anchor_fingers = ["l_index", "r_index"]

# Same row-synchrony structure as drifter — matched row territory
# is valuable in both philosophies.
[analyzers.hand_territory]
same_row_reward = 0.5
one_row_penalty = -0.3
two_row_penalty = -1.0

# Flexion cascades are unrewarded (or actively penalized if a user
# sets a negative weight). Default here: neutral.
[analyzers.flexion_cascade]
weight = 0.0
allowed_rows = ["home", "bottom"]

# Extension cascades earn the mirror reward.
[analyzers.extension_cascade]
weight = 1.5
allowed_rows = ["home", "top"]

[analyzers.row_cascade]
weight = -3.0

[analyzers.terminal_penalty]
l_pinky = -0.5
l_ring = 0.0
l_middle = 0.0
l_index = 0.0
r_index = 0.0
r_middle = 0.0
r_ring = 0.0
r_pinky = -0.5

# Async hand drift is uncomfortable in both philosophies — extension
# users dislike it as much as flexion users.
[analyzers.async_hand_drift]
weight = -2.0

[analyzers.row_distribution]
top_weight = 0.0
home_weight = 0.0
bottom_weight = 0.0

[analyzers.finger_load]
overload_weight = -0.05
l_pinky = 1.0
l_ring = 1.8
l_middle = 2.0
l_index = 1.5
r_index = 1.5
r_middle = 2.0
r_ring = 1.8
r_pinky = 1.0
